    /* =============================================

   ============================================= */
*, *::before, *::after {
  box-sizing: border-box;
}

/* 所有按钮、链接、导航项统一高级动画 */
a, button, .nav-item, .buy-card-btn, [class*="download"], .btn {
  position: relative !important;
  overflow: hidden !important;
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1) !important;
  z-index: 1 !important;
}

/* 悬浮效果：上移 + 放大 + 发光阴影 */
a:hover, button:hover, .nav-item:hover, .buy-card-btn:hover, [class*="download"]:hover, .btn:hover {
  transform: translateY(-4px) scale(1.08) !important;
  box-shadow: 0 8px 25px rgba(255, 60, 100, 0.25) !important;
}

/* 闪光扫光效果 */
a:hover::before,
button:hover::before,
.nav-item:hover::before,
.buy-card-btn:hover::before,
[class*="download"]:hover::before,
.btn:hover::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shine 0.7s ease forwards;
  z-index: -1;
}
@keyframes shine {
  to { left: 100%; }
}

/* LOGO、头像、图片：呼吸发光 + 悬浮放大 */
img, .logo, .avatar, .nav-icon i {
  transition: all 0.4s ease !important;
}
img:hover, .logo:hover, .avatar:hover, .nav-icon i:hover {
  transform: scale(1.15) !important;
  filter: drop-shadow(0 0 12px rgba(255, 70, 110, 0.45)) !important;
}

/* 全局呼吸发光动画（一直轻微闪烁，高级感拉满） */
.logo, .avatar, .buy-card-btn, [class*="download"] {
  animation: breathe 2.8s infinite ease-in-out;
}
@keyframes breathe {
  0%   { box-shadow: 0 0 8px rgba(255,70,110,0.15); }
  50%  { box-shadow: 0 0 18px rgba(255,70,110,0.3); }
  100% { box-shadow: 0 0 8px rgba(255,70,110,0.15); }
}
